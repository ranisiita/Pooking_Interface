<app-navbar></app-navbar>

<div class="auth-container">
  <div class="auth-content">
    <div class="auth-form-wrapper">
      <button class="close-btn" routerLink="/">&times;</button>
      <h2 class="auth-title">Login</h2>

      <form class="auth-form">
        <div class="form-group">
          <label>Usuario</label>
          <div class="input-wrapper">
            <span class="material-icons">person_outline</span>
            <input type="text" placeholder="Tu nombre de usuario" required>
          </div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <span class="material-icons">visibility</span>
            <input type="password" placeholder="********" required>
          </div>
        </div>

        <div class="forgot-password">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="submit-btn">Inciar Sesión</button>
      </form>

      <div class="auth-footer">
        <p>¿No tienes una cuenta? <a routerLink="/signup">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</div>
