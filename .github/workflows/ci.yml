name: CI — Pooking Interface

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (Vitest)
        run: npm run test:unit

      - name: Build production
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pooking-dist
          path: dist/
          retention-days: 7

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pooking-interface:${{ github.sha }} .

      # Uncomment and configure registry push when ready:
      # - name: Push to registry
      #   run: |
      #     echo ${{ secrets.REGISTRY_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      #     docker tag pooking-interface:${{ github.sha }} ghcr.io/${{ github.repository }}/pooking-interface:latest
      #     docker push ghcr.io/${{ github.repository }}/pooking-interface:latest
